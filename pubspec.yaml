name: learnock_drm
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: 3.22.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  no_screenshot: any
  safe_device: ^1.3.8
  url_launcher: ^6.3.1
  video_player: ^2.9.5
  chewie: ^1.8.7
  flutter_pdfview: ^1.4.4
  provider: ^6.1.5+1
  intl: ^0.20.2
  lottie: ^3.1.3
  google_fonts: ^6.1.0
  http: ^1.6.0
  path_provider: ^2.1.5
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.2.2
  mobile_scanner: ^5.2.0
  uuid: ^4.5.1
  font_awesome_flutter: ^10.7.0
  flutter_spinkit: ^5.2.1
  curved_navigation_bar: ^1.0.6
  flutter_widget_from_html_core: ^0.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/app_bg.png
    - assets/lang/